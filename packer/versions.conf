# OpenBSD version definitions for regression testing
#
# Each entry defines the short version, install ISO name, mirror path,
# and SHA256 checksum (from https://mirrors.openbsd.org/pub/OpenBSD/X.Y/amd64/SHA256).
#
# Usage: sourced by build.sh when -V <version> is passed.
#
# To add a new version:
#   1. Download the SHA256 file from an official OpenBSD mirror.
#   2. Copy the checksum for install<XY>.iso (amd64).
#   3. Add a new block below following the same pattern.
#
# Mirror used: https://mirrors.openbsd.org/pub/OpenBSD/
# Architecture: amd64

OPENBSD_MIRROR="https://mirrors.openbsd.org/pub/OpenBSD"

# ---------------------------------------------------------------------------
# OpenBSD 7.8  (released October 2025)
# ---------------------------------------------------------------------------
ISO_URL_78="${OPENBSD_MIRROR}/7.8/amd64/install78.iso"
ISO_SHA256_78="a228d0a1ef558b4d9ec84c698f0d3ffd13cd38c64149487cba0f1ad873be07b2"
ISO_VER_78="7.8"

# ---------------------------------------------------------------------------
# OpenBSD 7.7  (released April 2025)
# ---------------------------------------------------------------------------
ISO_URL_77="${OPENBSD_MIRROR}/7.7/amd64/install77.iso"
ISO_SHA256_77="VERIFY_FROM_OPENBSD_MIRROR_77"
ISO_VER_77="7.7"

